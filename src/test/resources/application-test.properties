spring.datasource.url=jdbc:h2:mem:supplierdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Tests use Hibernate's create-drop on H2 — Flyway is disabled to avoid PostgreSQL-only SQL.
spring.flyway.enabled=false

# Disable real Kafka in tests; embedded broker is provided by @EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers:localhost:9092}

app.security.user=admin
app.security.password=admin123
app.kafka.topic.supplier-events=supplier-events
