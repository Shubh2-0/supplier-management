# Overrides for Docker profile — actual values come from docker-compose env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/supplierdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:supplier}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:supplier_pass}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
app.security.user=${APP_SECURITY_USER:admin}
app.security.password=${APP_SECURITY_PASSWORD:admin123}
