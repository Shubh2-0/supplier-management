spring.application.name=supplier-management
server.port=8080

# ---- Datasource (override via env / docker profile) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/supplierdb
spring.datasource.username=supplier
spring.datasource.password=supplier_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# Flyway owns schema — Hibernate only validates entity ⇄ table mapping at startup.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Kafka producer ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ---- Kafka consumer (audit listener) ----
spring.kafka.consumer.group-id=supplier-audit
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.brightcore.suppliermanagement.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.brightcore.suppliermanagement.event.SupplierEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

app.kafka.topic.supplier-events=supplier-events
app.kafka.topic.partitions=3
app.kafka.topic.replicas=1

# ---- Security (basic auth) ----
app.security.user=admin
app.security.password=admin123

# ---- OpenAPI / Swagger ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ---- Logging ----
logging.level.root=INFO
logging.level.com.brightcore.suppliermanagement=DEBUG
logging.level.org.springframework.kafka=WARN
