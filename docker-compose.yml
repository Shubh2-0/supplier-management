services:
  postgres:
    image: postgres:16-alpine
    container_name: supplier-postgres
    environment:
      POSTGRES_DB: supplierdb
      POSTGRES_USER: supplier
      POSTGRES_PASSWORD: supplier_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supplier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplier -d supplierdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    # KRaft-mode Kafka — no Zookeeper required
    image: apache/kafka:3.8.0
    container_name: supplier-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single-broker dev settings
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - supplier-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplier-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supplierdb
      SPRING_DATASOURCE_USERNAME: supplier
      SPRING_DATASOURCE_PASSWORD: supplier_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_USER: admin
      APP_SECURITY_PASSWORD: admin123
    ports:
      - "8080:8080"
    networks:
      - supplier-net

networks:
  supplier-net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
